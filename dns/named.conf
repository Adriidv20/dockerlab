options {
    directory "/var/cache/bind";
    listen-on port 53 { any; };
    listen-on-v6 { none; };

    allow-query {
        localhost;
        172.10.0.0/24;
        172.20.0.0/24;
        172.30.0.0/24;
        172.40.0.0/24;
    };

    recursion no;
};

zone "prod.lab.test" IN {
    type master;
    file "/etc/bind/zones/db.prod.lab.test";
};

zone "dev.lab.test" IN {
    type master;
    file "/etc/bind/zones/db.dev.lab.test";
};