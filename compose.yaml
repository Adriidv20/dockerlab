services:
  firewall:
    image: linuxserver/wireguard:latest
    container_name: firewall
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Madrid
      - SERVERURL=auto
      - SERVERPORT=51820
      - PEERS=2
      - INTERNAL_CONTROL_CONFIG=true
    volumes:
      # MAPEAMOS EL SCRIPT A LA CARPETA DE AUTO-ARRANQUE DE LA IMAGEN
      - ./firewall/rules.sh:/custom-cont-init.d/rules.sh
    sysctls:
      - net.ipv4.ip_forward=1
    networks:
      vpn_net:
        ipv4_address: 172.10.0.2
      services_net:
        ipv4_address: 172.20.0.3
      production_net:
        ipv4_address: 172.30.0.2
      development_net:
        ipv4_address: 172.40.0.3
    restart: unless-stopped

  dns:
    build:
      context: ./dns
    image: dockerlab-dns:1.0
    container_name: dns
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    networks:
      services_net:
        ipv4_address: 172.20.0.10

  # --- SEMANA 4: BASE DE DATOS ACTUALIZADA ---
  db:
    image: postgres:15-alpine
    container_name: postgres_db
    environment:
      POSTGRES_USER: user_prod
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: prod_db
    networks:
      production_net:          # Red original
        ipv4_address: 172.30.0.20
      services_net:            # Punto 4: Interfaz adicional para Backup
        ipv4_address: 172.20.0.20

  # --- SEMANA 4: CONTENEDOR NAS ---
  nas:
    image: alpine:3.20
    container_name: nas_server
    volumes:
      - ./nas_data:/backups
      - ./scripts/backup.sh:/usr/local/bin/backup.sh:ro
    networks:
      services_net:
        ipv4_address: 172.20.0.30
    # Comando en una sola línea. Lanzamos crond en segundo plano y bloqueamos con tail
    command: sh -c "id -u john >/dev/null 2>&1 || adduser -D john; apk add --no-cache rsync cronie postgresql-client; echo '0 2 * * * sh /usr/local/bin/backup.sh' > /etc/crontabs/root; crond; tail -f /dev/null"
    restart: always
  vpn_test:
    image: alpine:3.20
    container_name: vpn_test
    cap_add:
      - NET_ADMIN
    depends_on:
      - firewall
    volumes:
      - ./scripts/vpn-init.sh:/scripts/vpn-init.sh:ro
    # Modificamos el entrypoint para crear primero a John y mantenerlo vivo
    command: sh -c "adduser -D john && sh /scripts/vpn-init.sh && tail -f /dev/null"
    networks:
      vpn_net:
        ipv4_address: 172.10.0.3

  svc_test:
    image: alpine:3.20
    container_name: svc_test
    cap_add:
      - NET_ADMIN
    depends_on:
      - firewall
    volumes:
      - ./scripts/svc-init.sh:/scripts/svc-init.sh:ro
    # Dependencias incluidas en las comillas y contenedor mantenido vivo
    command: sh -c "apk add --no-cache bind-tools && adduser -D john && sh /scripts/svc-init.sh && tail -f /dev/null"
    networks:
      services_net:
        ipv4_address: 172.20.0.21

  prod_test:
    image: alpine:3.20
    container_name: prod_test
    cap_add:
      - NET_ADMIN
    depends_on:
      - firewall
    volumes:
      - ./scripts/prod-init.sh:/scripts/prod-init.sh:ro
    command: sh -c "adduser -D john && sh /scripts/prod-init.sh && tail -f /dev/null"
    networks:
      production_net:
        ipv4_address: 172.30.0.3

  dev_test:
    image: alpine:3.20
    container_name: dev_test
    cap_add:
      - NET_ADMIN
    depends_on:
      - firewall
    volumes:
      - ./scripts/dev-init.sh:/scripts/dev-init.sh:ro
    command: sh -c "adduser -D john && sh /scripts/dev-init.sh && tail -f /dev/null"
    networks:
      development_net:
        ipv4_address: 172.40.0.2

networks:
  vpn_net:
    name: vpn_net
    driver: bridge
    ipam:
      config:
        - subnet: 172.10.0.0/24
          gateway: 172.10.0.1
  services_net:
    name: services_net
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24
          gateway: 172.20.0.1
  production_net:
    name: production_net
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/24
          gateway: 172.30.0.1
  development_net:
    name: development_net
    driver: bridge
    ipam:
      config:
        - subnet: 172.40.0.0/24
          gateway: 172.40.0.1